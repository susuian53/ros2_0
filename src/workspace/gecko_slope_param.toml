# GeckoCrawl Slope Gait Parameters — 壁虎斜坡爬行参数
#
# 核心调整 (vs 默认 usergait_param_full.toml):
#   - ctrl_point[2] = 0.02 (极小→Z字形下扎式触地, 默认 0.4)
#   - ctrl_point[0] = 0.04 (正向→足端后蹬分量)
#   - pos_des[2]  = -0.08 (超低重心, 默认 -0.05)
#   - step_height = 0.14 (高抬腿, 避免拖地)
#   - acc_des     = [5,5,8, 60,60,15] (增强阻尼, 减小触地冲击)
#   - duration    = 400 (低步频, 默认 270)
#
# 每条腿占 4 个 step, 四个腿共 16 个 step 构成完整周期

